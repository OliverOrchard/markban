<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Time — markban</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root { --border: rgba(255,255,255,0.1); --col-bg: rgba(255,255,255,0.04); }
        body { padding: 0 24px 40px; overflow: auto; height: auto; }
        .report-header { display: flex; align-items: center; gap: 16px; padding: 16px 0; }
        .report-header h1 { font-size: 1.4rem; color: var(--accent); margin: 0; }
        .report-header a { font-size: 0.85rem; color: #888; text-decoration: none; }
        .report-header a:hover { color: var(--accent); }
        .filters { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .filters label { font-size: 0.85rem; color: #888; }
        .filters input[type=date] {
            background: #333; border: 1px solid #555; color: var(--text);
            padding: 5px 10px; border-radius: 6px; font-size: 0.85rem; outline: none;
        }
        .filters input[type=date]:focus { border-color: var(--accent); }
        .filters button {
            background: transparent; border: 1px solid #555; color: #aaa;
            padding: 5px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer;
        }
        .filters button:hover { border-color: var(--accent); color: white; }
        #chart-container {
            background: #1e1e1e; border: 1px solid var(--border);
            border-radius: 8px; padding: 16px; margin-bottom: 24px;
        }
        #scatter-canvas { display: block; width: 100%; height: 380px; }
        .legend { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #aaa; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-line { width: 20px; height: 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.9rem; }
        th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); color: #aaa; font-weight: 600; }
        td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--col-bg); }
        .days { text-align: right; font-variant-numeric: tabular-nums; }
        .avg-row td { border-top: 2px solid var(--border); font-weight: 600; color: var(--accent); }
        .no-data { color: #888; padding: 24px 0; }
        #loading { color: #888; padding: 24px 0; }
        #error { color: #e05c5c; padding: 16px 0; }
        #summary { color: #888; font-size: 0.85rem; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="report-header">
        <h1>&#x23F1; Cycle Time Report</h1>
        <a href="/">&#x2190; Back to board</a>
    </div>

    <div class="filters">
        <label for="date-from">From:</label>
        <input type="date" id="date-from" onchange="applyFilter()">
        <label for="date-to">To:</label>
        <input type="date" id="date-to" onchange="applyFilter()">
        <button onclick="clearFilter()">Clear</button>
    </div>

    <div id="loading">Loading git history&#x2026;</div>
    <div id="error" style="display:none"></div>
    <div id="report" style="display:none">
        <div id="chart-container">
            <canvas id="scatter-canvas"></canvas>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background:#ff00ff"></div>
                    <span>Completed item</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background:#4a9eff"></div>
                    <span id="legend-p50">p50</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background:#f0a030"></div>
                    <span id="legend-p85">p85</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background:#e05c5c"></div>
                    <span id="legend-p95">p95</span>
                </div>
            </div>
        </div>
        <p id="summary"></p>
        <p class="no-data" id="no-data" style="display:none">No completed work items found in git history.</p>
        <table id="table" style="display:none">
            <thead>
                <tr>
                    <th>ID</th><th>Slug</th><th>Started</th><th>Completed</th><th class="days">Days</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
            <tfoot id="table-foot"></tfoot>
        </table>
    </div>

    <script>
        let allEntries = [];

        function esc(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function percentile(sorted, p) {
            if (sorted.length === 0) return 0;
            if (sorted.length === 1) return sorted[0];
            const idx = (p / 100) * (sorted.length - 1);
            const lo = Math.floor(idx), hi = Math.ceil(idx);
            return lo === hi ? sorted[lo] : sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
        }

        function getFilteredEntries() {
            const from = document.getElementById('date-from').value;
            const to = document.getElementById('date-to').value;
            return allEntries.filter(e => {
                if (!e.completedDate) return false;
                if (from && e.completedDate < from) return false;
                if (to && e.completedDate > to) return false;
                return true;
            });
        }

        function drawChart(entries) {
            const canvas = document.getElementById('scatter-canvas');
            const dpr = window.devicePixelRatio || 1;
            const cssW = canvas.offsetWidth;
            const cssH = canvas.offsetHeight || 380;
            canvas.width = cssW * dpr;
            canvas.height = cssH * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const W = cssW, H = cssH;

            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, W, H);

            const withDays = entries.filter(e => e.daysInProgress != null && e.completedDate);
            if (withDays.length === 0) return;

            const margin = { top: 20, right: 80, bottom: 44, left: 52 };
            const cW = W - margin.left - margin.right;
            const cH = H - margin.top - margin.bottom;

            const dates = withDays.map(e => new Date(e.completedDate).getTime());
            const days = withDays.map(e => e.daysInProgress);
            const minDate = Math.min(...dates), maxDate = Math.max(...dates);
            const maxDays = Math.max(...days);
            const yMax = Math.ceil(maxDays * 1.15) || 1;
            const dateRange = maxDate - minDate || 86400000;

            const scaleX = d => margin.left + ((d - minDate) / dateRange) * cW;
            const scaleY = d => margin.top + cH - (d / yMax) * cH;

            // Grid + axes
            ctx.strokeStyle = 'rgba(255,255,255,0.07)';
            ctx.lineWidth = 1;
            const yTicks = 5;
            for (let i = 0; i <= yTicks; i++) {
                const v = (yMax / yTicks) * i;
                const y = scaleY(v);
                ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + cW, y); ctx.stroke();
                ctx.fillStyle = '#666'; ctx.font = '11px Segoe UI, sans-serif'; ctx.textAlign = 'right';
                ctx.fillText(Math.round(v), margin.left - 6, y + 4);
            }

            // X axis date labels
            ctx.textAlign = 'center'; ctx.fillStyle = '#666';
            const numXLabels = Math.min(6, withDays.length);
            for (let i = 0; i <= numXLabels; i++) {
                const t = minDate + (dateRange / numXLabels) * i;
                const x = scaleX(t);
                ctx.fillText(new Date(t).toISOString().slice(5, 10), x, margin.top + cH + 16);
            }

            // Y axis label
            ctx.save(); ctx.translate(14, margin.top + cH / 2); ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center'; ctx.fillStyle = '#666'; ctx.font = '11px Segoe UI, sans-serif';
            ctx.fillText('Days', 0, 0); ctx.restore();

            // Axes
            ctx.strokeStyle = '#444'; ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top); ctx.lineTo(margin.left, margin.top + cH);
            ctx.lineTo(margin.left + cW, margin.top + cH); ctx.stroke();

            // Percentile lines
            const sorted = [...days].sort((a, b) => a - b);
            const p50 = percentile(sorted, 50);
            const p85 = percentile(sorted, 85);
            const p95 = percentile(sorted, 95);
            const pLines = [
                { v: p50, color: '#4a9eff', label: `p50: ${p50.toFixed(1)}d` },
                { v: p85, color: '#f0a030', label: `p85: ${p85.toFixed(1)}d` },
                { v: p95, color: '#e05c5c', label: `p95: ${p95.toFixed(1)}d` }
            ];
            ctx.setLineDash([6, 4]);
            for (const pl of pLines) {
                const y = scaleY(pl.v);
                ctx.strokeStyle = pl.color; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + cW, y); ctx.stroke();
                ctx.fillStyle = pl.color; ctx.textAlign = 'left'; ctx.font = '11px Segoe UI, sans-serif';
                ctx.fillText(pl.label, margin.left + cW + 6, y + 4);
            }
            ctx.setLineDash([]);

            // Update legend
            document.getElementById('legend-p50').textContent = `p50: ${p50.toFixed(1)}d`;
            document.getElementById('legend-p85').textContent = `p85: ${p85.toFixed(1)}d`;
            document.getElementById('legend-p95').textContent = `p95: ${p95.toFixed(1)}d`;

            // Data points
            ctx.fillStyle = 'rgba(255, 0, 255, 0.8)';
            for (const entry of withDays) {
                const x = scaleX(new Date(entry.completedDate).getTime());
                const y = scaleY(entry.daysInProgress);
                ctx.beginPath(); ctx.arc(x, y, 4.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        function renderTable(entries) {
            const tbody = document.getElementById('table-body');
            const tfoot = document.getElementById('table-foot');
            tbody.innerHTML = '';
            tfoot.innerHTML = '';

            const sorted = [...entries].sort((a, b) =>
                (a.completedDate || '').localeCompare(b.completedDate || ''));

            for (const entry of sorted) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${esc(entry.id)}</td>
                    <td>${esc(entry.slug)}</td>
                    <td>${esc(entry.startedDate || '—')}</td>
                    <td>${esc(entry.completedDate || '—')}</td>
                    <td class="days">${entry.daysInProgress != null ? entry.daysInProgress.toFixed(1) : '—'}</td>`;
                tbody.appendChild(tr);
            }

            const withDays = entries.filter(e => e.daysInProgress != null);
            if (withDays.length > 0) {
                const avg = withDays.reduce((s, e) => s + e.daysInProgress, 0) / withDays.length;
                tfoot.innerHTML = `<tr class="avg-row">
                    <td colspan="4">Average (${withDays.length} item${withDays.length === 1 ? '' : 's'})</td>
                    <td class="days">${avg.toFixed(1)}</td></tr>`;
            }
        }

        function applyFilter() {
            const entries = getFilteredEntries();
            const report = document.getElementById('report');
            const noData = document.getElementById('no-data');
            const table = document.getElementById('table');
            const summary = document.getElementById('summary');

            report.style.display = '';
            if (entries.length === 0) {
                noData.style.display = '';
                table.style.display = 'none';
                drawChart([]);
                summary.textContent = allEntries.length > 0
                    ? 'No items in selected date range.'
                    : 'No completed work items found in git history.';
            } else {
                noData.style.display = 'none';
                table.style.display = '';
                drawChart(entries);
                renderTable(entries);
                const total = allEntries.length;
                const shown = entries.length;
                summary.textContent = shown === total
                    ? `${total} completed item${total === 1 ? '' : 's'} found in git history.`
                    : `Showing ${shown} of ${total} completed item${total === 1 ? '' : 's'}.`;
            }
        }

        function clearFilter() {
            document.getElementById('date-from').value = '';
            document.getElementById('date-to').value = '';
            applyFilter();
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const el = document.getElementById('error');
            el.style.display = '';
            el.textContent = 'Error: ' + msg;
        }

        async function load() {
            try {
                const res = await fetch('/api/reports/cycle-time');
                if (!res.ok) {
                    const err = await res.json().catch(() => ({ detail: res.statusText }));
                    showError(err.detail || res.statusText);
                    return;
                }
                allEntries = await res.json();
                document.getElementById('loading').style.display = 'none';
                applyFilter();
            } catch (e) {
                showError(e.message);
            }
        }

        window.addEventListener('resize', () => { if (allEntries.length > 0) drawChart(getFilteredEntries()); });
        load();
    </script>
</body>
</html>
